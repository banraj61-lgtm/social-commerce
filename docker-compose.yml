version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: socialbazaar-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: socialbazaar
      POSTGRES_PASSWORD: socialbazaar_dev
      POSTGRES_DB: socialbazaar
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: socialbazaar-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: socialbazaar-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: socialbazaar
      MINIO_ROOT_PASSWORD: socialbazaar_dev
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: socialbazaar-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: socialbazaar_dev_key
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
